name: opal
description: Opal — A YouTube Music client with Liquid Glass UI built in Flutter.
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  provider: ^6.1.2
  # Audio
  just_audio: ^0.9.39
  audio_session: ^0.1.21
  audio_service: ^0.18.15
  # Network
  http: ^1.2.1
  crypto: ^3.0.3
  # Images
  cached_network_image: ^3.3.1
  # Storage
  shared_preferences: ^2.2.3
  # URL launcher for Google login
  url_launcher: ^6.2.5
  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/
